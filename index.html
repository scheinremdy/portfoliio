<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Sunshine Remollo</h1>

  <div class="controls">

      <button onclick="setLang('en')">EN</button>

    </div>

    <button onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
</header>

<main>

<section class="fade">
  <p id="about"></p>
</section>

<section class="fade">
  <h2 id="projects-title"></h2>

  <div class="grid">

    <div class="card">
      <h3>Eco-Friendly Route Planner</h3>
      <a href="https://github.com/scheinremdy/Eco-Friendly-Route-Planner" target="_blank">GitHub →</a>
    </div>

    <div class="card">
      <h3>Weather App</h3>
      <a href="https://github.com/scheinremdy/weather2.2" target="_blank">GitHub →</a>
    </div>

    <div class="card">
      <h3>Energy Consumption</h3>
      <a href="https://github.com/scheinremdy/energy-consumption" target="_blank">GitHub →</a>
    </div>

    <div class="card">
      <h3>IoT Energy Monitor</h3>
      <a href="https://github.com/scheinremdy/Iot-Based-Energy-Monitor" target="_blank">GitHub →</a>
    </div>

  </div>
</section>

<section class="fade">
  <h2 id="contact-title"></h2>
  <p>
    <a href="mailto:remollosunshine.de@gmail.com">
      remollosunshine.de@gmail.com
    </a>
  </p>
</section>

</main>

<footer>
  <p>© 2026</p>
</footer>

<script src="script.js"></script>

</body>
</html>
