<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sunshine Remollo</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="nav">
    <h1>Sunshine</h1>

    <div>
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('de')">DE</button>
      <button onclick="setLang('zh')">中文</button>
      <button onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <div class="hero">
    <h2 id="hero-title"></h2>
    <p id="hero-sub"></p>
  </div>
</header>

<main>

<section class="about">

</section>

<section>
  <h2 id="projects-title"></h2>

    </div>

    <div class="card">
      <h3>Weather App</h3>
      <p id="p2"></p>
      <span>API · Async JS</span>
      <a href="https://github.com/scheinremdy/weather2.2">View →</a>
    </div>

    <div class="card">
      <h3>Energy Tracker</h3>
      <p id="p3"></p>
      <span>Data · UI</span>
      <a href="https://github.com/scheinremdy/energy-consumption">View →</a>
    </div>

    <div class="card">
      <h3>IoT Monitor</h3>
      <p id="p4"></p>
      <span>Systems · Concept</span>
      <a href="https://github.com/scheinremdy/Iot-Based-Energy-Monitor">View →</a>
    </div>

  </div>
</section>

<section class="contact">
  <h2 id="contact-title"></h2>
  <a href="mailto:remollosunshine.de@gmail.com">
    remollosunshine.de@gmail.com
  </a>
</section>

</main>

<script src="script.js"></script>

</body>
</html>
